name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Home Memory test dataset
        run: |
          mkdir -p data
          npm run memory:dataset -- --start-date 2026-07-01 --days 31 --seed 42 --output data/home-memory-days.json

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
